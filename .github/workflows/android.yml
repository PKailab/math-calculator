name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22' # आपके प्रोजेक्ट के हिसाब से सही वर्शन

      - name: Install and Build Web Files
        run: |
          npm install
          npm run build  # यह आपकी 'dist' फोल्डर बनाएगा

      - name: Build Android APK (PWABuilder)
        uses: pwa-builder/pwabuilder-google-play@v1
        with:
          # नोट: PWABuilder को आपकी साइट लाइव चाहिए होती है। 
          # अगर आप GitHub Actions से APK बनाना चाहते हैं, 
          # तो आपको अपनी रिपॉजिटरी का GitHub Pages लिंक देना चाहिए।
          url: 'https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/'
          # अगर आपकी साइट किसी और लिंक पर लाइव है (जैसे Vercel), तो यहाँ वो लिंक डालें:
          # url: 'https://your-math-calculator.vercel.app'

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: android-apk
          # PWABuilder का आउटपुट आमतौर पर 'dist' या रूट में बनता है
          path: ./**/*.apk
