name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install and Build Web Files
        run: |
          npm install
          npm run build  # मान लीजिए कि आपका आउटपुट 'dist' फोल्डर में आता है

      - name: Set up Java
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'

      # सीधे Google के Bubblewrap टूल का इस्तेमाल
      - name: Build Android APK with Bubblewrap
        run: |
          npm install -g @bubblewrap/cli
          # 'init' की जगह सीधे 'build' करना PWA प्रोजेक्ट्स के लिए बेस्ट है
          # नोट: अगर आपके पास पहले से 'twa-manifest.json' नहीं है, तो इसे मैन्युअली चलाना होगा।
          
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: ./*.apk
